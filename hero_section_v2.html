<!DOCTYPE html>
<div style="background:#0a0a0a;border-radius:12px;overflow:hidden;position:relative;min-height:580px;font-family:'Segoe UI',sans-serif;">

<style>
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{from{width:0}to{width:100%}}

.cursor{display:inline-block;width:8px;height:14px;background:#00cc55;border-radius:1px;vertical-align:middle;animation:blink 1.1s step-end infinite;margin-left:2px;}
.line{animation:fadeUp 0.3s ease forwards;opacity:0;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(#1a2e1a22 1px,transparent 1px),linear-gradient(90deg,#1a2e1a22 1px,transparent 1px);background-size:60px 60px;}
.glow{position:absolute;top:0;left:0;width:45%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(0,255,106,0.06) 0%,transparent 70%);}
</style>

<div class="grid-bg"></div>
<div class="glow"></div>

<!-- NAV -->
<div style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;">
  <span style="color:#00cc55;font-size:15px;font-weight:700;letter-spacing:1px;">FedericoGS</span>
  <div style="display:flex;gap:32px;">
    <span style="color:#555;font-size:13px;cursor:pointer;">Inicio</span>
    <span style="color:#555;font-size:13px;cursor:pointer;">Proyectos</span>
    <span style="color:#555;font-size:13px;cursor:pointer;">Experiencia</span>
    <span style="color:#555;font-size:13px;cursor:pointer;">Contacto</span>
  </div>
</div>

<!-- BODY -->
<div style="position:relative;z-index:2;display:flex;align-items:center;gap:0;padding:24px 48px 40px;">

  <!-- LEFT -->
  <div style="flex:1;min-width:0;">
    <!-- Badge -->
    <div style="display:inline-flex;align-items:center;gap:8px;background:#0d2414;border:1px solid #1a4a25;border-radius:20px;padding:5px 14px;margin-bottom:28px;">
      <div style="width:7px;height:7px;border-radius:50%;background:#00cc55;box-shadow:0 0 6px #00cc55;animation:blink 2s ease-in-out infinite;"></div>
      <span style="color:#00cc55;font-size:11px;font-weight:600;letter-spacing:0.6px;">DISPONIBLE PARA PROYECTOS</span>
    </div>

    <!-- Name -->
    <div style="font-size:54px;font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:12px;">
      <div style="color:#fff;">Federico</div>
      <div style="color:#00ff6a;">González</div>
    </div>

    <!-- Role -->
    <div style="color:#888;font-size:15px;margin-bottom:18px;">Full-Stack Developer &nbsp;·&nbsp; Uruguay</div>

    <!-- Tagline -->
    <div style="color:#e0e0e0;font-size:19px;font-weight:600;margin-bottom:6px;">Convierto ideas en productos reales.</div>
    <div style="color:#555;font-size:13px;margin-bottom:36px;">Next.js · Node · PostgreSQL · 2 años en producción</div>

    <!-- CTAs -->
    <div style="display:flex;gap:12px;">
      <button style="background:#00cc55;color:#000;border:none;border-radius:22px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;">Descargar CV</button>
      <button style="background:transparent;color:#00cc55;border:1.5px solid #2a6a3a;border-radius:22px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;">Ver proyectos →</button>
    </div>
  </div>

  <!-- RIGHT — Terminal -->
  <div style="flex:1;min-width:0;max-width:500px;margin-left:48px;">
    <div style="background:#0d1a0e;border:1px solid #1a3a1a;border-radius:12px;overflow:hidden;">

      <!-- Terminal header -->
      <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #1a3a1a;background:#0a140b;">
        <div style="width:12px;height:12px;border-radius:50%;background:#ff5f57;"></div>
        <div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></div>
        <div style="width:12px;height:12px;border-radius:50%;background:#28c840;"></div>
        <span style="margin-left:8px;color:#2a5a2a;font-size:12px;font-family:monospace;">~/federico — zsh</span>
      </div>

      <!-- Terminal body -->
      <div id="terminal" style="padding:20px 20px 24px;font-family:monospace;font-size:13px;line-height:1.8;min-height:320px;"></div>
    </div>
  </div>

</div>

<script>
const term = document.getElementById('terminal');

const lines = [
  { delay: 200,  type: 'cmd',    text: 'whoami' },
  { delay: 600,  type: 'out',    text: 'Federico González — Full-Stack Dev' },
  { delay: 900,  type: 'cmd',    text: 'cat stack.txt' },
  { delay: 1300, type: 'out',    text: 'Next.js  React  TypeScript' },
  { delay: 1400, type: 'out',    text: 'Node.js  FastAPI  PostgreSQL' },
  { delay: 1500, type: 'out',    text: 'OCI  Vercel  Render' },
  { delay: 1900, type: 'cmd',    text: 'ls proyectos/' },
  { delay: 2300, type: 'out',    text: 'lacteos-ecommerce/   kodatek-agency/' },
  { delay: 2400, type: 'out',    text: 'saas-inventario/     nfc-cards-uy/' },
  { delay: 2800, type: 'cmd',    text: 'cat status.json' },
  { delay: 3200, type: 'json',   text: '{ "disponible": true, "agencia": "KodaTek", "ubicacion": "Montevideo" }' },
  { delay: 3800, type: 'cmd',    text: 'echo $MOTTO' },
  { delay: 4300, type: 'green',  text: '"Del wireframe al deploy."' },
  { delay: 4800, type: 'prompt', text: '' },
];

lines.forEach(({ delay, type, text }) => {
  setTimeout(() => {
    const el = document.createElement('div');
    el.style.animation = 'fadeUp 0.25s ease forwards';
    el.style.opacity = '0';

    if (type === 'cmd') {
      el.innerHTML = `<span style="color:#2a6a2a;">❯</span> <span style="color:#ccc;">${text}</span>`;
    } else if (type === 'out') {
      el.innerHTML = `<span style="color:#666;padding-left:16px;">${text}</span>`;
    } else if (type === 'json') {
      el.innerHTML = `<span style="color:#4a9a4a;padding-left:16px;">${text}</span>`;
    } else if (type === 'green') {
      el.innerHTML = `<span style="color:#00cc55;padding-left:16px;">${text}</span>`;
    } else if (type === 'prompt') {
      el.innerHTML = `<span style="color:#2a6a2a;">❯</span> <span class="cursor"></span>`;
    }

    term.appendChild(el);
  }, delay);
});
</script>
</div>
